<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ poem.title }}</title>

    <link rel="stylesheet" href="{% static 'core/shell.css' %}">
    <link rel="stylesheet" href="{% static 'poems/' %}{{ poem.slug }}/style.css">

    <style>
        @font-face {
            font-family: 'PoemFont';
            src: url("{% static 'poems/' %}{{ poem.slug }}/fonts/font.ttf") format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body,
        #textDisplay,
        .text-display,
        .poem-line,
        .special-line,
        .highlight-word {
            font-family: 'PoemFont', 'Georgia', serif !important;
        }

        h1 {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
        }
    </style>
</head>
<body class="poem-page" data-slug="{{ poem.slug }}">

<div class="background-container" id="backgroundContainer"></div>

<!-- ===== АУДИО (ОДИН ДЛЯ ВСЕХ) ===== -->
<audio id="poemAudio">
    <source src="{% static 'poems/' %}{{ poem.slug }}/audio/{{ poem.audio_file }}">
</audio>

<header>
    <nav>
        <a href="/"><button id="homeBtn" type="button">← На главную</button></a>
        <button id="startBtn">Начать чтение</button>
        <button id="repeatBtn">Повторить</button>
        <button id="authorBtn">Мысль автора</button>
    </nav>
</header>

<main>
    <h1>{{ poem.title }}</h1>
    <div class="text-display" id="textDisplay"></div>
</main>

<div id="author-modal" class="author-modal">
    <div class="author-modal-content">
        <button id="close-modal" class="close-modal">×</button>
        <h2>Мысль автора</h2>
        <p id="author-text">{{ poem.author_thought|linebreaks }}</p>
    </div>
</div>

<script src="{% static 'poems/' %}{{ poem.slug }}/script.js"></script>

</body>
</html>
