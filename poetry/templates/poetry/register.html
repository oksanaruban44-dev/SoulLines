<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0a0f2c, #1b1f3a);
    font-family: Georgia, serif;
    color: #fff;
}

/* карточка */
.form-box {
    width: 340px;
    padding: 30px;
    border-radius: 16px;

    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(212,175,55,0.4);
    backdrop-filter: blur(12px);

    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

/* заголовок */
h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #ffd98a;
    letter-spacing: 1px;
}

/* ошибки */
.errorlist {
    color: #ff6b6b;
    list-style: none;
    padding: 0;
    margin-bottom: 10px;
    font-size: 14px;
}

/* поля */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;

    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);

    background: rgba(0,0,0,0.35);
    color: white;
}

/* кнопка */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;

    background: #c9921b;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ffd36a;
    transform: translateY(-2px);
}
</style>

</head>

<body>

<div class="form-box">

<h2>Вход</h2>

{{ form.errors }}

<form method="post">
    {% csrf_token %}

    <label>Логин</label>
    <input name="username" type="text">

    <label>Пароль</label>
    <input name="password" type="password">

    <button type="submit">Войти</button>
</form>

</div>

</body>
</html>
