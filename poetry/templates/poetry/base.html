<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SoulLines</title>

    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: #0f0f14;
            color: #eaeaea;
        }

        header {
            padding: 30px;
            text-align: center;
            font-size: 32px;
            letter-spacing: 2px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }

        a {
            color: #c084fc;
            text-decoration: none;
        }

        a:hover {
            color: #ffffff;
        }

        .poem-link {
            display: block;
            padding: 12px;
            margin: 10px 0;
            border-left: 2px solid #c084fc;
        }

        .cards-header {
    text-align: center;
    margin-bottom: 40px;
}

.cards-header h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.cards-header p {
    opacity: 0.8;
}

.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.poem-card {
    display: block;
    padding: 25px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s ease;
}

.poem-card:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.1);
}

.card-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 12px;
}

.card-description {
    opacity: 0.7;
}

.back-button {
    display: inline-block;
    margin-top: 30px;
    padding: 10px 18px;
    border-radius: 12px;
    border: 1px solid #c084fc;
}
    </style>
</head>

<body>

<header>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
