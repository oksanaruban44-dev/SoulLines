<!-- КОНТЕНТ (СПИСОК, БЕЗ РАМОК) -->
<div style="position: relative; z-index: 1; padding: 20px;">

    <div class="cards-header" style="text-align: center; color: #f5f2ee; margin-bottom: 30px;">
        <h1 style="font-weight: 400; letter-spacing: 2px; font-size: 2rem; text-shadow: 0 0 12px rgba(212, 184, 122, 0.3);">🎴 Поэтические послания</h1>
        <p style="opacity: 0.7; font-size: 0.95rem; margin-top: 6px;">Выберите стихотворение для просмотра вариантов оформления.</p>
    </div>

    <!-- СПИСОК (БЕЗ РАМОК И КАРТОЧЕК) -->
    <div style="display: flex; flex-direction: column; gap: 12px; width: min(550px, 90vw); margin: 0 auto; max-height: 55vh; overflow-y: auto; padding-right: 8px;">
        {% for poem in poems %}
            <a href="{% url 'poem_cards' poem.id %}" style="display: flex; gap: 12px; align-items: center; padding: 12px 16px; text-decoration: none; color: #f5f2ee; border-bottom: 1px solid rgba(212, 184, 122, 0.15); transition: 0.2s; background: transparent;">
                <span style="color: #d4b87a; font-size: 1.1rem;">❦</span>
                <span style="font-weight: 300; letter-spacing: 0.3px;">{{ poem.title }}</span>
            </a>
        {% endfor %}
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="{% url 'index' %}" style="color: #d4b87a; text-decoration: none; padding: 6px 18px; border-radius: 30px; border: 1px solid rgba(212, 184, 122, 0.2); transition: 0.25s; font-size: 0.9rem; backdrop-filter: blur(2px); background: rgba(10, 15, 40, 0.3); display: inline-block;">
            ← Вернуться к оглавлению
        </a>
    </div>

</div>
